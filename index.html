<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fat Will</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="image-container" style="position:relative;">
        <img id="fatWill" src="will.jpg" alt="Fat Will" style="user-drag:none;user-select:none;">
        <div id="mouthZone" style="position:absolute;left:50%;top:40%;width:80px;height:40px;transform:translate(-50%,-50%);z-index:2;">
            <div style="width:150px;height:150px;border-radius:50%;opacity:0.6;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);"></div>
        </div>
    </div>
    <img id="burger" src="burger.png" alt="Stretch" style="width:96px;height:96px;position:absolute;left:20px;top:20px;z-index:3;cursor:grab;user-drag:none;user-select:none;">
    <div id="winPopup" class="popup-overlay" style="display:none;">
        <div class="popup-content">
            <h2>Fully Fattend!</h2>
            <button id="playAgainBtn">Play Again</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
